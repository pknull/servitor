# Egregore Node 1 - Primary
data_dir: /data
port: 7654
gossip_port: 7655
gossip_bind: "0.0.0.0"
gossip_interval_secs: 60
discovery_port: 7656

# Shared network key - all nodes must match
network_key: "a2a-mesh-test-network"

# Static peers - point to other nodes
peers:
  - "egregore-2:7655"
  - "egregore-3:7655"

# Disable discovery (using static peers in docker network)
lan_discovery: false
mdns_discovery: false

# Enable push for real-time replication
push_enabled: true
max_persistent_connections: 8

# API settings
api_enabled: true
api_bind: "0.0.0.0"
api_auth_enabled: false
mcp_enabled: false
