# Servitor 2 - Middle node
# Has A2A server and delegates to servitor-3

[identity]
data_dir = "/var/lib/servitor"

[egregore]
api_url = "http://egregore-2:7654"
subscribe = true

[llm]
provider = "ollama"
base_url = "http://ollama:11434/v1"
model = "llama3.2:3b"

[agent]
max_turns = 10
timeout_secs = 120
publish_trace_spans = true

[task]
offer_ttl_secs = 300
offer_timeout_secs = 60
assign_timeout_secs = 300
start_timeout_secs = 30
eta_buffer_multiplier = 1.5
ping_timeout_secs = 30

[heartbeat]
interval_secs = 30

[metrics]
enabled = true
bind = "0.0.0.0:9091"

# A2A Server
[a2a_server]
enabled = true
bind = "0.0.0.0:8765"
name = "servitor-2"
description = "Middle servitor in delegation chain"
task_timeout_secs = 120
max_concurrent_tasks = 5

# A2A Client - delegate to servitor-3 only (DAG topology)
[a2a.servitor-3]
url = "http://servitor-3:8765"
timeout_secs = 60
poll_interval_ms = 500

# No MCP servers - A2A-only test configuration
