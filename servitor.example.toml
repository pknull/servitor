# Servitor Configuration
# Copy this to servitor.toml and customize for your environment.

[identity]
# Directory for identity storage (Ed25519 keypair)
data_dir = "~/.servitor"

[egregore]
# Egregore API endpoint
api_url = "http://127.0.0.1:7654"
# Enable SSE subscription in daemon mode (real-time task feed)
subscribe = false
# Task authorization is controlled by ~/.servitor/authority.toml, not by an
# inline allowlist in servitor.toml.

# Reserved: parsed by the config schema but not yet enforced by the runtime.
# [egregore.group]
# name = "workers"
# heartbeat_interval_secs = 5

[llm]
# Provider: "anthropic", "openai", "ollama", "openai-compat", "codex", "claude-code"
provider = "anthropic"
model = "claude-sonnet-4-20250514"
api_key_env = "ANTHROPIC_API_KEY"

# Optional: max_tokens = 4096
# Optional: temperature = 0.7

# Alternative: Ollama (local inference)
# [llm]
# provider = "ollama"
# base_url = "http://localhost:11434/v1"
# model = "llama3.3:70b"

# Alternative: OpenAI-compatible endpoint
# [llm]
# provider = "openai-compat"
# base_url = "https://openrouter.ai/api/v1"
# model = "anthropic/claude-3.5-sonnet"
# api_key_env = "OPENROUTER_API_KEY"

# Alternative: Codex OAuth provider
# [llm]
# provider = "codex"
# model = "gpt-5-codex"
# token_file = "~/.codex/auth.json"
# oauth_profile = "openai-codex:default"

# Alternative: Claude Code provider
# [llm]
# provider = "claude-code"
# model = "claude-sonnet-4-20250514"

[agent]
# Maximum LLM turns per task
max_turns = 50
# Task timeout in seconds
timeout_secs = 300
# Optional: Custom system prompt prefix
# system_prompt = "You are a helpful assistant."
# Optional: publish trace_span messages for task and tool execution
publish_trace_spans = false

[task]
# Offer time-to-live before the servitor withdraws an unassigned offer
offer_ttl_secs = 300
# How long a requestor has to react before an offer window is considered stale
offer_timeout_secs = 60
# How long an assignment remains valid before it is considered stale
assign_timeout_secs = 300
# How long the servitor has to acknowledge start
start_timeout_secs = 30
# Multiplier applied to ETA before treating execution as overrun
eta_buffer_multiplier = 1.5
# How long to wait after a ping before treating a task as unresponsive
ping_timeout_secs = 30

[heartbeat]
# Heartbeat interval for capability advertisement
interval_secs = 10
# Optional: include runtime monitoring fields like uptime, MCP health, and task counters
include_runtime_monitoring = false

[metrics]
# Enable Prometheus metrics endpoint
enabled = false
# Bind address for metrics HTTP server
bind = "127.0.0.1:9091"

# A2A Server
# Enables external A2A agents to discover and invoke Servitor's capabilities.
# [a2a_server]
# enabled = true
# bind = "127.0.0.1:8765"
# name = "servitor"
# description = "Task executor with shell and docker capabilities"
# task_timeout_secs = 300
# max_concurrent_tasks = 10

# MCP Servers
# Each server provides tool capabilities to the Servitor.

[mcp.shell]
transport = "stdio"
command = "mcp-server-shell"
# Optional: args = []
# Optional: env = { "VAR" = "value" }
timeout_secs = 60

# Scope enforcement
scope.allow = ["execute:~/scripts/*", "read:*"]
scope.block = ["execute:/etc/*", "execute:rm *", "execute:sudo *"]
# Optional: Convert MCP notifications to tasks
# on_notification = "Handle event: {{notification}}"

[mcp.docker]
transport = "stdio"
command = "mcp-server-docker"
timeout_secs = 120

scope.allow = ["*"]
scope.block = ["container_lifecycle:traefik", "container_lifecycle:portainer"]

# HTTP transport example
# [mcp.remote]
# transport = "http"
# url = "http://localhost:3000/mcp"
# timeout_secs = 30
# scope.allow = ["*"]

# Communication transports
# Discord transport for direct messaging
# [comms.discord]
# token_env = "DISCORD_BOT_TOKEN"           # Bot token from environment
# guild_allowlist = ["123456789"]           # Guilds to respond in (empty = all)
# require_mention = true                     # Only respond to @mentions
# notification_channel = "channel-id"       # Where to send notifications

# Reserved: parsed by the config schema but not yet instantiated by the runtime
# [comms.http]
# bind = "127.0.0.1"
# port = 8765
# auth_token = "your-secret-token"

# Scheduled tasks (cron-style, 6-field cron with seconds)
# [[schedule]]
# name = "daily-email-check"
# cron = "0 0 9 * * *"           # 9:00 AM daily (sec min hr day mon dow)
# task = "Check my email and summarize anything important"
# publish = true                  # Publish result to egregore
# notify = "discord:channel:inbox-alerts"

# [[schedule]]
# name = "hourly-backup-check"
# cron = "0 0 * * * *"           # Every hour at :00
# task = "Verify backup status and report any failures"
# publish = false

